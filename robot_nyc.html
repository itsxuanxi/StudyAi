<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudyAI NYC</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
      background: black;
    }

    /* 🎬 背景视频 */
    video {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.9) contrast(1.1);
    }

    /* 🌐 顶部网址栏 */
    .browser-bar {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      height: 55px;
      background: rgba(255,255,255,0.9);
      border-radius: 15px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 10;
    }

    .url {
      font-size: 18px;
      font-weight: bold;
      color: #111;
    }

    /* 🔥 CTA按钮 */
    .btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 28px;
      background: white;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      color: black;
      z-index: 10;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateX(-50%) scale(1.05);
    }

    /* 🎬 渐变增强电影感 */
    .overlay-top {
      position: absolute;
      top: 0;
      width: 100%;
      height: 200px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
      z-index: 5;
    }

    .overlay-bottom {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 200px;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      z-index: 5;
    }
  </style>
</head>

<body>

  <!-- 🎬 你的纽约视频 -->
  <video autoplay muted loop playsinline>
    <source src="nyc.mp4" type="video/mp4">
  </video>

  <!-- 渐变 -->
  <div class="overlay-top"></div>
  <div class="overlay-bottom"></div>

  <!-- 🌐 网址 -->
  <div class="browser-bar">
    <div class="url">
      https://studyai-x.streamlit.app
    </div>
  </div>

  <!-- 🔥 按钮 -->
  <a class="btn" href="https://studyai-x.streamlit.app" target="_blank">
    Try StudyAI
  </a>

</body>
</html>
