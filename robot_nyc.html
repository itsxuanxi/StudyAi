<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ===== REAL URL WRITTEN NEAR THE TOP ===== -->
  <meta name="project-url" content="https://studyai-x.streamlit.app" />
  <title>Future New York AI Robot Walk</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --real-url: "https://studyai-x.streamlit.app";
    }

    body {
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #050816;
      color: white;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 15%, rgba(90,140,255,0.18), transparent 30%),
        linear-gradient(to bottom, #081121 0%, #0d1730 30%, #101626 60%, #06080f 100%);
    }

    .browser-bar {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: min(900px, 94vw);
      height: 56px;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      z-index: 50;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .dots {
      display: flex;
      gap: 8px;
      margin-right: 14px;
      flex-shrink: 0;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green { background: #28c840; }

    .url-box {
      flex: 1;
      height: 36px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      display: flex;
      align-items: center;
      padding: 0 16px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.04);
    }

    .url-box a {
      color: #eaf2ff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.2px;
    }

    .url-box a:hover {
      text-decoration: underline;
    }

    .moon {
      position: absolute;
      top: 92px;
      right: 120px;
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff, #dfe8ff 55%, #94b4ff 100%);
      box-shadow: 0 0 45px rgba(180, 214, 255, 0.6);
      z-index: 1;
    }

    .stars {
      position: absolute;
      inset: 0;
      z-index: 1;
      background-image:
        radial-gradient(2px 2px at 8% 16%, rgba(255,255,255,0.85), transparent),
        radial-gradient(2px 2px at 20% 8%, rgba(255,255,255,0.75), transparent),
        radial-gradient(1.5px 1.5px at 32% 18%, rgba(255,255,255,0.75), transparent),
        radial-gradient(2px 2px at 50% 10%, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 67% 15%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.5px 1.5px at 79% 7%, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 90% 20%, rgba(255,255,255,0.78), transparent);
      animation: twinkle 4s infinite alternate;
      opacity: 0.85;
    }

    @keyframes twinkle {
      from { opacity: 0.5; }
      to { opacity: 1; }
    }

    .skyline {
      position: absolute;
      left: 0;
      bottom: 190px;
      width: 100%;
      height: 280px;
      z-index: 3;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 0 20px;
    }

    .building {
      position: relative;
      background: linear-gradient(to bottom, #1a2744, #090f1d);
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow:
        inset 0 0 30px rgba(0,0,0,0.32),
        0 0 20px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .building::before {
      content: "";
      position: absolute;
      inset: 10px 8px;
      background-image:
        linear-gradient(to right,
          rgba(255, 224, 140, 0.85) 22%, transparent 22%, transparent 50%,
          rgba(255, 224, 140, 0.85) 50%, rgba(255, 224, 140, 0.85) 72%, transparent 72%, transparent),
        linear-gradient(to bottom,
          transparent 0 11px, rgba(255,255,255,0.05) 11px 12px, transparent 12px 24px);
      background-size: 24px 24px, 100% 24px;
      opacity: 0.85;
    }

    .b1 { width: 90px; height: 180px; }
    .b2 { width: 120px; height: 230px; }
    .b3 { width: 75px; height: 155px; }
    .b4 { width: 170px; height: 270px; }
    .b5 { width: 100px; height: 190px; }
    .b6 { width: 135px; height: 240px; }
    .b7 { width: 82px; height: 170px; }
    .b8 { width: 115px; height: 215px; }
    .b9 { width: 150px; height: 255px; }

    .billboard {
      position: absolute;
      background: rgba(0, 255, 255, 0.09);
      border: 1px solid rgba(0,255,255,0.5);
      box-shadow:
        0 0 18px rgba(0,255,255,0.25),
        inset 0 0 18px rgba(0,255,255,0.14);
      color: #90ffff;
      text-shadow: 0 0 12px rgba(0,255,255,0.6);
      font-weight: bold;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
      animation: holoFlicker 2.2s infinite alternate;
    }

    .bb1 {
      top: 30px;
      left: 18px;
      width: 90px;
      height: 40px;
      font-size: 12px;
    }

    .bb2 {
      top: 50px;
      right: 12px;
      width: 70px;
      height: 34px;
      font-size: 10px;
    }

    .bb3 {
      top: 28px;
      left: 30px;
      width: 110px;
      height: 46px;
      font-size: 13px;
    }

    @keyframes holoFlicker {
      from { opacity: 0.72; }
      to { opacity: 1; }
    }

    .flying-lane {
      position: absolute;
      top: 170px;
      left: -10%;
      width: 120%;
      height: 2px;
      background: linear-gradient(to right, transparent, rgba(120,220,255,0.28), transparent);
      z-index: 4;
      box-shadow: 0 0 14px rgba(120,220,255,0.25);
    }

    .car {
      position: absolute;
      width: 78px;
      height: 26px;
      border-radius: 20px 16px 12px 12px;
      background: linear-gradient(to right, #70e8ff, #7a7dff);
      box-shadow:
        0 0 18px rgba(110,230,255,0.75),
        0 0 30px rgba(122,125,255,0.35);
      z-index: 5;
    }

    .car::before,
    .car::after {
      content: "";
      position: absolute;
      top: 9px;
      width: 28px;
      height: 8px;
      background: rgba(120,240,255,0.65);
      filter: blur(6px);
      border-radius: 999px;
    }

    .car::before { left: -18px; }
    .car::after { right: -18px; }

    .car1 {
      top: 155px;
      left: -120px;
      animation: fly1 8s linear infinite;
      transform: scale(0.95);
    }

    .car2 {
      top: 215px;
      left: 110%;
      animation: fly2 11s linear infinite;
      transform: scale(0.75);
      background: linear-gradient(to right, #ff59f8, #7a7dff);
    }

    .car3 {
      top: 125px;
      left: -160px;
      animation: fly3 13s linear infinite;
      transform: scale(0.65);
      background: linear-gradient(to right, #ffe66d, #70e8ff);
    }

    @keyframes fly1 {
      from { left: -120px; }
      to { left: 110%; }
    }

    @keyframes fly2 {
      from { left: 110%; }
      to { left: -140px; }
    }

    @keyframes fly3 {
      from { left: -160px; }
      to { left: 110%; }
    }

    .road {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 230px;
      z-index: 8;
      background:
        linear-gradient(to bottom, #151515 0%, #1b1b1b 30%, #090909 100%);
      overflow: hidden;
    }

    .road::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, transparent 0%, rgba(0, 255, 255, 0.02) 55%, rgba(0, 255, 255, 0.06) 100%);
      pointer-events: none;
    }

    .lane {
      position: absolute;
      top: 112px;
      left: -10%;
      width: 120%;
      height: 6px;
      background: repeating-linear-gradient(
        to right,
        transparent 0 40px,
        #ffe36e 40px 92px
      );
      animation: roadMove 1.35s linear infinite;
      opacity: 0.95;
    }

    @keyframes roadMove {
      from { transform: translateX(0); }
      to { transform: translateX(-132px); }
    }

    .road-glow {
      position: absolute;
      bottom: 10px;
      width: 100%;
      height: 120px;
      background:
        linear-gradient(to top, rgba(0,255,255,0.08), transparent 70%);
      filter: blur(8px);
      opacity: 0.8;
    }

    .robot-wrapper {
      position: absolute;
      bottom: 76px;
      left: -180px;
      width: 180px;
      height: 230px;
      z-index: 20;
      animation: walkAcross 14s linear infinite;
    }

    @keyframes walkAcross {
      0% { left: -180px; }
      100% { left: calc(100vw + 40px); }
    }

    .shadow {
      position: absolute;
      bottom: 14px;
      left: 40px;
      width: 95px;
      height: 18px;
      background: radial-gradient(circle, rgba(0,0,0,0.45), transparent 70%);
      filter: blur(4px);
      animation: shadowPulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes shadowPulse {
      from { transform: scaleX(1); opacity: 0.34; }
      to { transform: scaleX(0.88); opacity: 0.52; }
    }

    .robot {
      position: absolute;
      left: 40px;
      bottom: 0;
      width: 100px;
      height: 192px;
      animation: robotBounce 0.5s ease-in-out infinite alternate;
    }

    @keyframes robotBounce {
      from { transform: translateY(0px); }
      to   { transform: translateY(-5px); }
    }

    .head {
      position: absolute;
      top: 0;
      left: 22px;
      width: 56px;
      height: 50px;
      border-radius: 12px;
      background: linear-gradient(to bottom, #d7edff, #7cb6ff);
      border: 2px solid rgba(255,255,255,0.45);
      box-shadow: 0 0 18px rgba(85, 170, 255, 0.45);
    }

    .antenna {
      position: absolute;
      top: -18px;
      left: 26px;
      width: 4px;
      height: 18px;
      background: #abd7ff;
    }

    .antenna::before {
      content: "";
      position: absolute;
      top: -8px;
      left: -4px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00f7ff;
      box-shadow: 0 0 12px #00f7ff;
    }

    .eye {
      position: absolute;
      top: 18px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00f7ff;
      box-shadow: 0 0 12px #00f7ff;
    }

    .eye.left { left: 13px; }
    .eye.right { right: 13px; }

    .body {
      position: absolute;
      top: 56px;
      left: 16px;
      width: 68px;
      height: 72px;
      border-radius: 14px;
      background: linear-gradient(to bottom, #9fd6ff, #4a8fff);
      border: 2px solid rgba(255,255,255,0.35);
      box-shadow: 0 0 24px rgba(73,139,255,0.35);
    }

    .chest-light {
      position: absolute;
      top: 22px;
      left: 24px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #7cffd4;
      box-shadow: 0 0 18px #7cffd4;
    }

    .arm {
      position: absolute;
      top: 66px;
      width: 12px;
      height: 60px;
      border-radius: 8px;
      background: linear-gradient(to bottom, #b9ddff, #73adfc);
      transform-origin: top center;
    }

    .arm.left {
      left: 6px;
      animation: armLeft 0.6s ease-in-out infinite alternate;
    }

    .arm.right {
      right: 6px;
      animation: armRight 0.6s ease-in-out infinite alternate;
    }

    @keyframes armLeft {
      from { transform: rotate(25deg); }
      to   { transform: rotate(-25deg); }
    }

    @keyframes armRight {
      from { transform: rotate(-25deg); }
      to   { transform: rotate(25deg); }
    }

    .leg {
      position: absolute;
      top: 126px;
      width: 14px;
      height: 62px;
      border-radius: 10px;
      background: linear-gradient(to bottom, #b9ddff, #77b1ff);
      transform-origin: top center;
    }

    .leg.left {
      left: 28px;
      animation: legLeft 0.6s ease-in-out infinite alternate;
    }

    .leg.right {
      right: 28px;
      animation: legRight 0.6s ease-in-out infinite alternate;
    }

    @keyframes legLeft {
      from { transform: rotate(-24deg); }
      to   { transform: rotate(24deg); }
    }

    @keyframes legRight {
      from { transform: rotate(24deg); }
      to   { transform: rotate(-24deg); }
    }

    .city-fog {
      position: absolute;
      bottom: 140px;
      left: 0;
      width: 100%;
      height: 120px;
      background: linear-gradient(to top, rgba(130,170,255,0.08), transparent);
      filter: blur(16px);
      z-index: 6;
      pointer-events: none;
    }

    .title {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      font-size: clamp(16px, 2vw, 28px);
      color: rgba(255,255,255,0.94);
      letter-spacing: 1px;
      text-shadow: 0 0 14px rgba(0,0,0,0.55);
      text-align: center;
      width: 90%;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="browser-bar">
      <div class="dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      <div class="url-box">
        <a href="https://studyai-x.streamlit.app" target="_blank">
          https://studyai-x.streamlit.app
        </a>
      </div>
    </div>

    <div class="moon"></div>
    <div class="stars"></div>

    <div class="flying-lane"></div>
    <div class="car car1"></div>
    <div class="car car2"></div>
    <div class="car car3"></div>

    <div class="skyline">
      <div class="building b1">
        <div class="billboard bb1">NEON AI</div>
      </div>
      <div class="building b2">
        <div class="billboard bb2">XR</div>
      </div>
      <div class="building b3"></div>
      <div class="building b4">
        <div class="billboard bb3">FUTURE NYC</div>
      </div>
      <div class="building b5"></div>
      <div class="building b6">
        <div class="billboard bb2">BOT</div>
      </div>
      <div class="building b7"></div>
      <div class="building b8">
        <div class="billboard bb1">2035</div>
      </div>
      <div class="building b9"></div>
    </div>

    <div class="city-fog"></div>

    <div class="road">
      <div class="lane"></div>
      <div class="road-glow"></div>
    </div>

    <div class="robot-wrapper">
      <div class="shadow"></div>
      <div class="robot">
        <div class="head">
          <div class="antenna"></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
        </div>

        <div class="arm left"></div>
        <div class="arm right"></div>

        <div class="body">
          <div class="chest-light"></div>
        </div>

        <div class="leg left"></div>
        <div class="leg right"></div>
      </div>
    </div>

    <div class="title">AI Robot Walking Through Future New York at Night</div>
  </div>
</body>
</html>
