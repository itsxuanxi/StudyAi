<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Robot Walking in NYC at Night</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #050816;
    }

    .browser-bar {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: min(820px, 92vw);
      height: 52px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      z-index: 20;
      box-shadow: 0 8px 25px rgba(0,0,0,0.35);
    }

    .dots {
      display: flex;
      gap: 8px;
      margin-right: 14px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green { background: #28c840; }

    .url-box {
      flex: 1;
      height: 34px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      color: #eaf2ff;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 14px;
      letter-spacing: 0.2px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 15%, rgba(70,120,255,0.18), transparent 28%),
        linear-gradient(to bottom, #081121 0%, #0b1730 35%, #11182a 60%, #090d16 100%);
    }

    .moon {
      position: absolute;
      top: 90px;
      right: 140px;
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffffff, #d7e4ff 55%, #9ab4ff 100%);
      box-shadow: 0 0 40px rgba(183, 214, 255, 0.55);
      z-index: 1;
    }

    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 12% 22%, rgba(255,255,255,0.9), transparent),
        radial-gradient(2px 2px at 25% 16%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 60% 18%, rgba(255,255,255,0.85), transparent),
        radial-gradient(2px 2px at 72% 8%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 86% 20%, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 18% 8%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 52% 24%, rgba(255,255,255,0.7), transparent);
      z-index: 1;
      opacity: 0.9;
      animation: twinkle 4s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.55; }
      to { opacity: 1; }
    }

    .skyline {
      position: absolute;
      bottom: 180px;
      left: 0;
      width: 100%;
      height: 260px;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 0 20px;
    }

    .building {
      position: relative;
      background: linear-gradient(to bottom, #182540, #0a1020);
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
    }

    .building::before {
      content: "";
      position: absolute;
      inset: 10px 8px;
      background-image:
        linear-gradient(to right, rgba(255, 215, 120, 0.82) 24%, transparent 24%, transparent 50%, rgba(255, 215, 120, 0.82) 50%, rgba(255, 215, 120, 0.82) 74%, transparent 74%, transparent),
        linear-gradient(to bottom, transparent 0 10px, rgba(255,255,255,0.04) 10px 11px, transparent 11px 24px);
      background-size: 22px 22px, 100% 22px;
      opacity: 0.85;
    }

    .b1 { width: 90px; height: 180px; }
    .b2 { width: 120px; height: 230px; }
    .b3 { width: 80px; height: 150px; }
    .b4 { width: 160px; height: 260px; }
    .b5 { width: 100px; height: 190px; }
    .b6 { width: 140px; height: 240px; }
    .b7 { width: 78px; height: 165px; }
    .b8 { width: 110px; height: 210px; }
    .b9 { width: 145px; height: 250px; }

    .road {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 220px;
      background:
        linear-gradient(to bottom, #111 0%, #191919 30%, #0b0b0b 100%);
      z-index: 5;
    }

    .road::before {
      content: "";
      position: absolute;
      top: 40px;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent);
    }

    .lane {
      position: absolute;
      top: 110px;
      left: -10%;
      width: 120%;
      height: 6px;
      background:
        repeating-linear-gradient(
          to right,
          transparent 0 45px,
          #ffd54f 45px 95px
        );
      opacity: 0.95;
      animation: roadMove 1.4s linear infinite;
    }

    @keyframes roadMove {
      from { transform: translateX(0); }
      to { transform: translateX(-140px); }
    }

    .light-glow {
      position: absolute;
      bottom: 150px;
      width: 220px;
      height: 120px;
      background: radial-gradient(circle, rgba(255, 198, 87, 0.16), transparent 70%);
      filter: blur(8px);
      z-index: 4;
    }

    .glow1 { left: 12%; }
    .glow2 { left: 42%; }
    .glow3 { left: 72%; }

    .robot-wrapper {
      position: absolute;
      bottom: 74px;
      left: -180px;
      width: 180px;
      height: 220px;
      z-index: 10;
      animation: walkAcross 14s linear infinite;
    }

    @keyframes walkAcross {
      0%   { left: -180px; }
      100% { left: calc(100vw + 40px); }
    }

    .robot {
      position: absolute;
      bottom: 0;
      left: 40px;
      width: 100px;
      height: 190px;
      animation: robotBounce 0.5s ease-in-out infinite alternate;
    }

    @keyframes robotBounce {
      from { transform: translateY(0px); }
      to   { transform: translateY(-5px); }
    }

    .head {
      position: absolute;
      top: 0;
      left: 22px;
      width: 56px;
      height: 50px;
      background: linear-gradient(to bottom, #cde6ff, #7db3ff);
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.45);
      box-shadow: 0 0 18px rgba(92, 173, 255, 0.45);
    }

    .eye {
      position: absolute;
      top: 18px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00f7ff;
      box-shadow: 0 0 12px #00f7ff;
    }

    .eye.left { left: 13px; }
    .eye.right { right: 13px; }

    .antenna {
      position: absolute;
      top: -18px;
      left: 26px;
      width: 4px;
      height: 18px;
      background: #a9d3ff;
    }

    .antenna::before {
      content: "";
      position: absolute;
      top: -8px;
      left: -4px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00f7ff;
      box-shadow: 0 0 12px #00f7ff;
    }

    .body {
      position: absolute;
      top: 56px;
      left: 16px;
      width: 68px;
      height: 72px;
      background: linear-gradient(to bottom, #9fd3ff, #4b93ff);
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      box-shadow: 0 0 24px rgba(73, 139, 255, 0.35);
    }

    .chest-light {
      position: absolute;
      top: 22px;
      left: 24px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #7cffd4;
      box-shadow: 0 0 18px #7cffd4;
    }

    .arm {
      position: absolute;
      top: 66px;
      width: 12px;
      height: 60px;
      background: linear-gradient(to bottom, #b7dbff, #74aefc);
      border-radius: 8px;
      transform-origin: top center;
    }

    .arm.left {
      left: 6px;
      animation: armLeft 0.6s ease-in-out infinite alternate;
    }

    .arm.right {
      right: 6px;
      animation: armRight 0.6s ease-in-out infinite alternate;
    }

    @keyframes armLeft {
      from { transform: rotate(25deg); }
      to   { transform: rotate(-25deg); }
    }

    @keyframes armRight {
      from { transform: rotate(-25deg); }
      to   { transform: rotate(25deg); }
    }

    .leg {
      position: absolute;
      top: 126px;
      width: 14px;
      height: 62px;
      background: linear-gradient(to bottom, #b7dbff, #78b3ff);
      border-radius: 10px;
      transform-origin: top center;
    }

    .leg.left {
      left: 28px;
      animation: legLeft 0.6s ease-in-out infinite alternate;
    }

    .leg.right {
      right: 28px;
      animation: legRight 0.6s ease-in-out infinite alternate;
    }

    @keyframes legLeft {
      from { transform: rotate(-24deg); }
      to   { transform: rotate(24deg); }
    }

    @keyframes legRight {
      from { transform: rotate(24deg); }
      to   { transform: rotate(-24deg); }
    }

    .shadow {
      position: absolute;
      bottom: 14px;
      left: 38px;
      width: 96px;
      height: 18px;
      background: radial-gradient(circle, rgba(0,0,0,0.42), transparent 70%);
      filter: blur(3px);
      animation: shadowPulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes shadowPulse {
      from { transform: scaleX(1); opacity: 0.35; }
      to   { transform: scaleX(0.88); opacity: 0.5; }
    }

    .title {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.92);
      font-size: clamp(16px, 2vw, 26px);
      letter-spacing: 1px;
      z-index: 15;
      text-shadow: 0 0 14px rgba(0,0,0,0.55);
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="browser-bar">
      <div class="dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      <div class="url-box">https://future-ai-city.com/robot-walk-nyc-night</div>
    </div>

    <div class="moon"></div>
    <div class="stars"></div>

    <div class="skyline">
      <div class="building b1"></div>
      <div class="building b2"></div>
      <div class="building b3"></div>
      <div class="building b4"></div>
      <div class="building b5"></div>
      <div class="building b6"></div>
      <div class="building b7"></div>
      <div class="building b8"></div>
      <div class="building b9"></div>
    </div>

    <div class="light-glow glow1"></div>
    <div class="light-glow glow2"></div>
    <div class="light-glow glow3"></div>

    <div class="road">
      <div class="lane"></div>
    </div>

    <div class="robot-wrapper">
      <div class="shadow"></div>
      <div class="robot">
        <div class="head">
          <div class="antenna"></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
        </div>
        <div class="arm left"></div>
        <div class="arm right"></div>
        <div class="body">
          <div class="chest-light"></div>
        </div>
        <div class="leg left"></div>
        <div class="leg right"></div>
      </div>
    </div>

    <div class="title">AI Robot Walking in Downtown New York at Night</div>
  </div>
</body>
</html>
