<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyAI NYC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { overflow: hidden; background: black; }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: black;
    }

    .browser-bar {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      height: 55px;
      background: rgba(255,255,255,0.9);
      border-radius: 15px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 10;
    }

    .url {
      font-size: 18px;
      font-weight: bold;
      color: #111;
    }

    .btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 28px;
      background: white;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      color: black;
      z-index: 10;
    }

    .overlay-top {
      position: absolute;
      top: 0;
      width: 100%;
      height: 200px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
      z-index: 5;
      pointer-events: none;
    }

    .overlay-bottom {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 200px;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      z-index: 5;
      pointer-events: none;
    }

    .debug {
      position: absolute;
      left: 20px;
      bottom: 20px;
      z-index: 20;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline onclick="this.play()">
    <source src="/Users/xuanxi/nyc.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="overlay-top"></div>
  <div class="overlay-bottom"></div>

  <div class="browser-bar">
    <div class="url">https://studyai-x.streamlit.app</div>
  </div>

  <a class="btn" href="https://studyai-x.streamlit.app" target="_blank">Try StudyAI</a>

  <div class="debug" id="debug">Loading video...</div>

  <script>
    const video = document.getElementById("bgVideo");
    const debug = document.getElementById("debug");

    function setMsg(msg) {
      debug.textContent = msg;
      console.log(msg);
    }

    video.addEventListener("loadedmetadata", () => setMsg("loadedmetadata: video found"));
    video.addEventListener("canplay", () => setMsg("canplay: video can play"));
    video.addEventListener("playing", () => setMsg("playing: video is playing"));
    video.addEventListener("error", () => {
      const err = video.error;
      setMsg("video error: " + (err ? err.code : "unknown"));
    });

    video.play().then(() => {
      setMsg("play() success");
    }).catch((e) => {
      setMsg("play() blocked/error: " + e.message);
    });
  </script>

</body>
</html>
